<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #4b5563; }
      .entity-title { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .field { font: 15px 'Courier New', monospace; fill: #111827; }
      .note { font: 14px Arial, sans-serif; fill: #374151; }
      .line-label { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .entity { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 12; ry: 12; }
      .header-users { fill: #2563eb; rx: 12; ry: 12; }
      .header-courses { fill: #0f766e; rx: 12; ry: 12; }
      .header-assignments { fill: #9333ea; rx: 12; ry: 12; }
      .header-grades { fill: #b45309; rx: 12; ry: 12; }
      .header-notifications { fill: #be123c; rx: 12; ry: 12; }
      .header-join { fill: #4b5563; rx: 12; ry: 12; }
      .connector { stroke: #334155; stroke-width: 3; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#f1f5f9" />
  <text x="70" y="70" class="title">College LMS ER Diagram</text>
  <text x="70" y="100" class="subtitle">Person 3 backend/database schema implemented in EF Core and PostgreSQL</text>

  <g transform="translate(70,150)">
    <rect width="370" height="250" class="entity" />
    <rect width="370" height="48" class="header-users" />
    <text x="20" y="31" class="entity-title">Users</text>
    <text x="20" y="78" class="field">PK  Id : int</text>
    <text x="20" y="104" class="field">Name : varchar(100)</text>
    <text x="20" y="130" class="field">Email : varchar(255) UNIQUE</text>
    <text x="20" y="156" class="field">Role : varchar(32)</text>
    <text x="20" y="182" class="field">PasswordHash : varchar(512)</text>
    <text x="20" y="220" class="note">Check: Role IN ('Student','Instructor','Admin')</text>
  </g>

  <g transform="translate(610,150)">
    <rect width="370" height="250" class="entity" />
    <rect width="370" height="48" class="header-courses" />
    <text x="20" y="31" class="entity-title">Courses</text>
    <text x="20" y="78" class="field">PK  Id : int</text>
    <text x="20" y="104" class="field">Title : varchar(200)</text>
    <text x="20" y="130" class="field">Description : varchar(4000)</text>
    <text x="20" y="156" class="field">FK  InstructorId : int -> Users.Id</text>
    <text x="20" y="220" class="note">Each course is taught by one instructor/admin.</text>
  </g>

  <g transform="translate(610,470)">
    <rect width="370" height="250" class="entity" />
    <rect width="370" height="48" class="header-assignments" />
    <text x="20" y="31" class="entity-title">Assignments</text>
    <text x="20" y="78" class="field">PK  Id : int</text>
    <text x="20" y="104" class="field">Title : varchar(200)</text>
    <text x="20" y="130" class="field">Description : varchar(4000)</text>
    <text x="20" y="156" class="field">Deadline : timestamptz</text>
    <text x="20" y="182" class="field">FK  CourseId : int -> Courses.Id</text>
    <text x="20" y="220" class="note">Indexed by (CourseId, Deadline).</text>
  </g>

  <g transform="translate(70,470)">
    <rect width="370" height="250" class="entity" />
    <rect width="370" height="48" class="header-grades" />
    <text x="20" y="31" class="entity-title">Grades</text>
    <text x="20" y="78" class="field">PK  Id : int</text>
    <text x="20" y="104" class="field">FK  UserId : int -> Users.Id</text>
    <text x="20" y="130" class="field">FK  AssignmentId : int -> Assignments.Id</text>
    <text x="20" y="156" class="field">Score : double precision</text>
    <text x="20" y="182" class="field">SubmittedAt : timestamptz</text>
    <text x="20" y="220" class="note">Unique: (UserId, AssignmentId)</text>
  </g>

  <g transform="translate(1140,470)">
    <rect width="390" height="270" class="entity" />
    <rect width="390" height="48" class="header-notifications" />
    <text x="20" y="31" class="entity-title">Notifications</text>
    <text x="20" y="78" class="field">PK  Id : int</text>
    <text x="20" y="104" class="field">FK  UserId : int -> Users.Id</text>
    <text x="20" y="130" class="field">FK? AssignmentId : int -> Assignments.Id</text>
    <text x="20" y="156" class="field">Message : varchar(500)</text>
    <text x="20" y="182" class="field">IsRead : bool</text>
    <text x="20" y="208" class="field">CreatedAt : timestamptz</text>
    <text x="20" y="234" class="field">ReadAt : timestamptz NULL</text>
  </g>

  <g transform="translate(430,810)">
    <rect width="420" height="170" class="entity" />
    <rect width="420" height="48" class="header-join" />
    <text x="20" y="31" class="entity-title">CourseEnrollments</text>
    <text x="20" y="78" class="field">PK/FK CourseId : int -> Courses.Id</text>
    <text x="20" y="104" class="field">PK/FK StudentId : int -> Users.Id</text>
    <text x="20" y="140" class="note">Join table for student enrollment in courses.</text>
  </g>

  <path d="M440 275 L610 275" class="connector" />
  <text x="500" y="262" class="line-label">1</text>
  <text x="560" y="262" class="line-label">many taught courses</text>

  <path d="M795 400 L795 470" class="connector" />
  <text x="808" y="440" class="line-label">1 to many</text>

  <path d="M440 595 L610 595" class="connector" />
  <text x="486" y="582" class="line-label">many</text>
  <text x="557" y="582" class="line-label">to 1</text>

  <path d="M255 400 L255 470" class="connector" />
  <text x="270" y="440" class="line-label">1 to many</text>

  <path d="M1290 400 L1290 470" class="connector" />
  <text x="1306" y="440" class="line-label">1 to many</text>

  <path d="M980 595 L1140 595" class="connector" />
  <text x="1018" y="582" class="line-label">1 to many (optional)</text>

  <path d="M130 400 L130 895 L430 895" class="connector" />
  <text x="145" y="648" class="line-label">1</text>
  <text x="215" y="648" class="line-label">many enrollments</text>

  <path d="M930 400 L930 895 L850 895" class="connector" />
  <text x="945" y="648" class="line-label">1</text>
  <text x="870" y="880" class="line-label">many</text>

  <rect x="1085" y="810" width="445" height="150" rx="12" ry="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
  <text x="1110" y="846" class="note">Key backend constraints reflected here:</text>
  <text x="1110" y="876" class="note">- Users.Email is unique</text>
  <text x="1110" y="902" class="note">- Grades prevent duplicate submissions per user/assignment</text>
  <text x="1110" y="928" class="note">- Notifications support read/unread state and assignment-linked reminders</text>
</svg>
